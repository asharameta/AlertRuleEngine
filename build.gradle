plugins {
    id 'java'
}

group = 'com.soldevelo'
version = '1.0'


jar {
    manifest {
        attributes 'Main-Class': 'com.soldevelo.Main'
    }
    archiveFileName = 'AlertRuleEngine.jar'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

test {
    useJUnitPlatform()
}